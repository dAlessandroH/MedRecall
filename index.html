          ))}
        </div>
        <div style={{ fontSize: 11, color: 'var(--text3)', marginTop: 12, textAlign: 'center' }}>{filtered.length} tarjeta{filtered.length !== 1 ? 's' : ''}</div>
      </div>
    </div>
  );
}

/* ══ APP ROOT ═══════════════════════════════════════════════════ */
const INIT_STATS = { streak: 0, lastDate: null, total: 0, correct: 0, today: 0, history: Array(7).fill(0), xp: 0, achievements: [], dailyGoal: 20, sound: true, breakEvery: 20, hadPerfect: false, hadImport: false, hadAI: false, hadSprint: false, hadMix: false, hadAdd: false, dailyHistory: {} };

function App() {
  const [decks, setDecks] = useLS('mr4_decks', []);
  const [stats, setStats] = useLS('mr4_stats', INIT_STATS);
  const [apiKey, setApiKey] = useLS('mr4_apikey', '');
  const [darkMode, setDarkMode] = useLS('mr4_dark', true);
  const [view, setView] = useState('home');
  const [study, setStudy] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showQuickAdd, setShowQuickAdd] = useState(false);
  const [browsingDeck, setBrowsingDeck] = useState(null);
  const [toasts, setToasts] = useState([]);

  /* Apply theme class */
  useEffect(() => {
    if (darkMode) { document.documentElement.classList.remove('light'); }
    else { document.documentElement.classList.add('light'); }
  }, [darkMode]);
  const toggleTheme = () => setDarkMode(d => !d);

  /* Reset today count on new day */
  useEffect(() => {
    const td = todayStr();
    if (stats.lastDate !== td) {
      const yesterday = toDate(new Date(Date.now() - 86400000));
      setStats(s => ({ ...s, lastDate: td, today: 0, streak: s.lastDate === yesterday ? s.streak : 0 }));
    }
  }, []);

  /* XP + studied tracking */
  const addStudied = (ok, xpAmount = 10) => {
    const td = todayStr();
    setStats(s => {
      const h = [...(s.history || Array(7).fill(0))];
      const di = [1, 2, 3, 4, 5, 6, 0].indexOf(new Date().getDay());
      if (di >= 0) h[di] = 1;
      const dh = { ...(s.dailyHistory || {}) }; dh[td] = (dh[td] || 0) + 1;
      const newXP = (s.xp || 0) + xpAmount;
      const oldLvl = getLevel(s.xp || 0).level, newLvl = getLevel(newXP).level;
      if (newLvl > oldLvl && s.sound !== false) { SFX.play('levelup'); confettiBlast(); }
      return { ...s, total: (s.total || 0) + 1, correct: (s.correct || 0) + (ok ? 1 : 0), today: (s.today || 0) + 1, streak: Math.max(1, s.streak || 0), history: h, xp: newXP, dailyHistory: dh };
    });
  };

  /* Achievement check */
  useEffect(() => {
    const { achievements: newAchs, newOnes } = checkAchievements(stats, decks);
    if (newOnes.length > 0) {
      const xpBonus = newOnes.reduce((sum, id) => { const a = ACHIEVEMENTS.find(x => x.id === id); return sum + (a ? a.xp : 0); }, 0);
      setStats(s => ({ ...s, achievements: newAchs, xp: (s.xp || 0) + xpBonus }));
      if (stats.sound !== false) SFX.play('xp');
      setToasts(t => [...t, ...newOnes]);
    }
  }, [stats.total, stats.streak, stats.today, decks.length, stats.hadPerfect, stats.hadImport, stats.hadAI, stats.hadSprint, stats.hadMix, stats.hadAdd]);

  const removeToast = id => setToasts(t => t.filter(x => x !== id));

  /* Deck operations */
  const addDeck = deck => { setDecks(d => [...d, deck]); setStats(s => ({ ...s, hadImport: true })); setView('home'); };
  const addDeckAI = deck => { setDecks(d => [...d, deck]); setStats(s => ({ ...s, hadAI: true })); setView('home'); };
  const deleteDeck = id => { if (confirm('¿Eliminar este mazo?')) setDecks(d => d.filter(x => x.id !== id)); };
  const updateDeck = deck => setDecks(d => d.map(x => x.id === deck.id ? deck : x));
  const deleteCard = (deckId, cardId) => { setDecks(d => d.map(x => x.id === deckId ? { ...x, cards: x.cards.filter(c => c.id !== cardId) } : x)); setBrowsingDeck(b => b ? { ...b, cards: b.cards.filter(c => c.id !== cardId) } : null); };
  const addCard = (deckId, card) => { setDecks(d => d.map(x => x.id === deckId ? { ...x, cards: [...x.cards, card] } : x)); setStats(s => ({ ...s, hadAdd: true })); };
  const updateDeckName = (deckId, name) => { setDecks(d => d.map(x => x.id === deckId ? { ...x, name, pal: palFor(name) } : x)); setBrowsingDeck(b => b && b.id === deckId ? { ...b, name, pal: palFor(name) } : b); };

  /* Navigation */
  const navTo = v => { setStudy(null); setView(v); };
  const goStudy = (deck, mode) => { setStudy({ deck, mode }); setView('study'); };
  const backHome = () => { setStudy(null); setView('home'); };

  /* Start all due */
  const startAll = () => {
    const due = decks.filter(d => d.cards.some(isDue));
    if (due.length > 0) goStudy(due[0], 'recall');
    else if (decks.length > 0) goStudy(decks[0], 'recall');
  };

  /* Mix mode */
  const startMix = () => {
    const all = shuffle(decks.flatMap(d => d.cards.map(c => ({ ...c, deckName: d.name }))));
    if (!all.length) return;
    const mixDeck = { id: 'mix', name: 'Mix Mode', cards: all, pal: { color: '#a855f7', bg: 'rgba(168,85,247,0.12)', icon: 'ti-shuffle' } };
    goStudy(mixDeck, 'recall');
    setStats(s => ({ ...s, hadMix: true }));
  };

  const resetAll = () => { setDecks([]); setStats(INIT_STATS); setShowSettings(false); };

  /* Active deck for study (look up from decks or use mix deck) */
  const activeDeck = useMemo(() => {
    if (!study) return null;
    if (study.deck.id === 'mix') return study.deck;
    return decks.find(d => d.id === study.deck.id) || study.deck;
  }, [study, decks]);

  const soundOn = stats.sound !== false;
  const breakEvery = stats.breakEvery || 20;

  const renderStudy = () => {
    if (!activeDeck) return <div className="fade-up"><div style={{ padding: 40, textAlign: 'center', color: 'var(--text3)' }}>Mazo no encontrado. <button className="btn btn-sm btn-ghost" onClick={backHome}>Volver</button></div></div>;
    const base = { deck: activeDeck, onBack: backHome, onUpdateDeck: updateDeck, addStudied, soundOn };
    if (study.mode === 'recall') return <RecallSession {...base} breakEvery={breakEvery} />;
    if (study.mode === 'flash') return <Flashcards {...base} />;
    if (study.mode === 'quiz') return <Quiz {...base} onPerfect={() => setStats(s => ({ ...s, hadPerfect: true }))} />;
    if (study.mode === 'sprint') return <SprintMode {...base} onSprintDone={() => setStats(s => ({ ...s, hadSprint: true }))} />;
    return null;
  };

  return (
    <>
      <Header view={view} onNav={navTo} onSettings={() => setShowSettings(true)} stats={stats} darkMode={darkMode} onToggleTheme={toggleTheme} />
      <main className="main">
        {view === 'home' && <Dashboard decks={decks} stats={stats} onGo={goStudy} onNav={navTo} onDelete={deleteDeck} onStartAll={startAll} onQuickAdd={() => { if (!decks.length) { alert('Primero crea un mazo (Importar o Generar IA).'); return; } setShowQuickAdd(true); }} onBrowse={d => setBrowsingDeck(d)} onMix={startMix} />}
        {view === 'recall' && !study && <RecallHub decks={decks} onGo={goStudy} onNav={navTo} />}
        {view === 'stats' && <StatsPage stats={stats} decks={decks} />}
        {view === 'study' && renderStudy()}
        {view === 'import' && <ImportCSV onDeckCreated={addDeck} />}
        {view === 'generate' && <Generate onDeckCreated={addDeckAI} apiKey={apiKey} />}
        {view === 'achievements' && <AchievementsPage stats={stats} />}
      </main>
      {showSettings && <Settings onClose={() => setShowSettings(false)} apiKey={apiKey} setApiKey={setApiKey} onReset={resetAll} stats={stats} setStats={setStats} />}
      {showQuickAdd && decks.length > 0 && <QuickAddModal decks={decks} onAdd={addCard} onClose={() => setShowQuickAdd(false)} />}
      {browsingDeck && <CardBrowserModal deck={browsingDeck} onClose={() => setBrowsingDeck(null)} onDeleteCard={deleteCard} onUpdateDeckName={name => updateDeckName(browsingDeck.id, name)} />}
      {toasts.slice(0, 1).map(id => <AchievementToast key={id} achievement={id} onDone={() => removeToast(id)} />)}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
